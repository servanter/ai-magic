<svg width="1200" height="630" xmlns="http://www.w3.org/2000/svg">
  <!-- Gradient Background -->
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:rgb(99,102,241);stop-opacity:1" />
      <stop offset="100%" style="stop-color:rgb(168,85,247);stop-opacity:1" />
    </linearGradient>
    
    <!-- AI Grid Pattern -->
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
    </pattern>
    
    <!-- Transparent Checkerboard Pattern -->
    <pattern id="checker" width="20" height="20" patternUnits="userSpaceOnUse">
      <rect width="10" height="10" fill="rgba(255,255,255,0.2)"/>
      <rect x="10" y="10" width="10" height="10" fill="rgba(255,255,255,0.2)"/>
    </pattern>
  </defs>
  
  <!-- Background with gradient -->
  <rect width="1200" height="630" fill="url(#bgGradient)"/>
  
  <!-- AI Grid overlay -->
  <rect width="1200" height="630" fill="url(#grid)"/>
  
  <!-- Left Portrait Silhouette (Before) -->
  <g id="before-portrait">
    <!-- Background circle (messy background) -->
    <circle cx="300" cy="315" r="100" fill="rgba(255,255,255,0.1)" opacity="0.5"/>
    
    <!-- Portrait head -->
    <circle cx="300" cy="280" r="60" fill="rgb(34,211,238)"/>
    
    <!-- Portrait shoulders -->
    <ellipse cx="300" cy="355" rx="90" ry="50" fill="rgb(34,211,238)"/>
  </g>
  
  <!-- Arrow (Transformation) -->
  <g id="arrow">
    <line x1="450" y1="315" x2="650" y2="315" stroke="white" stroke-width="4"/>
    <polygon points="650,285 700,315 650,345" fill="white"/>
  </g>
  
  <!-- Right Portrait Silhouette (After - with transparent background) -->
  <g id="after-portrait">
    <!-- Checkerboard background (indicates transparency) -->
    <rect x="750" y="200" width="300" height="230" fill="url(#checker)" rx="10"/>
    
    <!-- Clean portrait head -->
    <circle cx="900" cy="280" r="60" fill="rgb(34,211,238)"/>
    
    <!-- Clean portrait shoulders -->
    <ellipse cx="900" cy="355" rx="90" ry="50" fill="rgb(34,211,238)"/>
  </g>
  
  <!-- AI Sparkles (decorative) -->
  <circle cx="150" cy="100" r="3" fill="rgba(255,255,255,0.8)"/>
  <circle cx="1050" cy="120" r="4" fill="rgba(255,255,255,0.9)"/>
  <circle cx="200" cy="500" r="2" fill="rgba(255,255,255,0.7)"/>
  <circle cx="980" cy="520" r="3" fill="rgba(255,255,255,0.8)"/>
  <circle cx="100" cy="300" r="4" fill="rgba(255,255,255,0.6)"/>
  <circle cx="1100" cy="350" r="2" fill="rgba(255,255,255,0.9)"/>
  <circle cx="250" cy="200" r="3" fill="rgba(255,255,255,0.7)"/>
  <circle cx="950" cy="180" r="5" fill="rgba(255,255,255,0.8)"/>
  <circle cx="180" cy="420" r="2" fill="rgba(255,255,255,0.6)"/>
  <circle cx="1020" cy="450" r="4" fill="rgba(255,255,255,0.9)"/>
  
  <!-- Title with shadow -->
  <text x="600" y="110" font-family="Arial, sans-serif" font-size="60" font-weight="bold" 
        text-anchor="middle" fill="rgba(0,0,0,0.3)">
    AI Background Removal
  </text>
  <text x="597" y="107" font-family="Arial, sans-serif" font-size="60" font-weight="bold" 
        text-anchor="middle" fill="white">
    AI Background Removal
  </text>
  
  <!-- Subtitle -->
  <text x="600" y="540" font-family="Arial, sans-serif" font-size="32" 
        text-anchor="middle" fill="rgb(34,211,238)">
    Complete 2026 Guide
  </text>
  
  <!-- Brand -->
  <text x="600" y="590" font-family="Arial, sans-serif" font-size="28" 
        text-anchor="middle" fill="rgba(255,255,255,0.7)">
    AImage.top
  </text>
</svg>
